{% extends "base.html" %}

{% block title %}Register - Page{% endblock %}

{% block head %}
{{ super() }}
    <link rel="stylesheet" href="/static/css/login.css">
    <script src="/static/js/registration.js" defer></script>
{% endblock %}


{% block content %}
    <section>
        <div class="content-block">
            <h1>Authorization</h1>
            <form id="registration-form" class="login-form">
                <div id="form-errors" class="error-message"></div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                    <div id="username-error" class="field-error"></div>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                    <div id="email-error" class="field-error"></div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                    <div id="password-error" class="field-error"></div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                    <div id="confirmPassword-error" class="field-error"></div>
                </div>

                <button type="submit" class="submit-btn">
                    <span id="btn-text">Register</span>
                    <div id="spinner" class="spinner"></div>
                </button>

                <div class="social-auth">
                    <p class="divider">or continue with</p>
                    <div class="social-buttons">
                        <a href="/auth/github" class="social-btn github" aria-label="GitHub">
                            <img src="/static/media/github-color-svgrepo-com.svg" alt="GitHub">
                        </a>
                        <a href="/auth/telegram" class="social-btn telegram" aria-label="Telegram">
                            <img src="/static/media/telegram-svgrepo-com.svg" alt="Telegram">
                        </a>
                        <a href="/auth/google" class="social-btn google" aria-label="Google">
                            <img src="/static/media/google-icon-logo-svgrepo-com.svg" alt="Google">
                        </a>
                    </div>
                </div>
            </form>
        </div>
    </section>
{% endblock %}
